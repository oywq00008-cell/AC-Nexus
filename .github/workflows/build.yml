name: Build All Platforms

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: '上传到哪个 Release（留空则创建新 Release）'
        required: false

permissions:
  contents: write

jobs:
  # ── Linux ──
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller --clean --noconfirm BroadlinkAC-linux.spec
          cd dist && tar czf ../BroadlinkAC-linux.tar.gz BroadlinkAC
      - uses: actions/upload-artifact@v4
        with: { name: BroadlinkAC-linux, path: BroadlinkAC-linux.tar.gz }

  # ── Windows ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller --clean --noconfirm BroadlinkAC.spec
          Compress-Archive -Path dist/BroadlinkAC.exe -DestinationPath BroadlinkAC-Windows.zip
      - uses: actions/upload-artifact@v4
        with: { name: BroadlinkAC-Windows, path: BroadlinkAC-Windows.zip }

  # ── macOS ──
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller --clean --noconfirm BroadlinkAC-macOS.spec
          cd dist && zip -ry ../BroadlinkAC-macOS.zip BroadlinkAC.app
      - uses: actions/upload-artifact@v4
        with: { name: BroadlinkAC-macOS, path: BroadlinkAC-macOS.zip }

  # ── Release ──
  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: 'BroadlinkAC-*', merge-multiple: true, path: artifacts }
      - run: ls -lh artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
