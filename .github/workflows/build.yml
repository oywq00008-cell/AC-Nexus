name: Build All Platforms

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: '上传到哪个 Release（留空则创建新 Release）'
        required: false

permissions:
  contents: write

jobs:
  # ── Linux ──
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller --clean --noconfirm AC-Nexus-linux.spec
          cp 打不开请看我.txt dist/
          cd dist && tar czf ../AC-Nexus-linux.tar.gz AC-Nexus 打不开请看我.txt
      - uses: actions/upload-artifact@v4
        with: { name: AC-Nexus-linux, path: AC-Nexus-linux.tar.gz }

  # ── Windows ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller --clean --noconfirm AC-Nexus.spec
          cp 打不开请看我.txt dist/
          Compress-Archive -Path dist/AC-Nexus.exe,dist/打不开请看我.txt -DestinationPath AC-Nexus-Windows.zip
      - uses: actions/upload-artifact@v4
        with: { name: AC-Nexus-Windows, path: AC-Nexus-Windows.zip }

  # ── macOS ──
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller --clean --noconfirm AC-Nexus-macOS.spec
          cp 打不开请看我.txt dist/
          cd dist && zip -ry ../AC-Nexus-macOS.zip AC-Nexus.app 打不开请看我.txt
      - uses: actions/upload-artifact@v4
        with: { name: AC-Nexus-macOS, path: AC-Nexus-macOS.zip }

  # ── Release ──
  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: 'AC-Nexus-*', merge-multiple: true, path: artifacts }
      - run: ls -lh artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
